# cargo-deny config — supply-chain gate for releases (ROL-103).
# `cargo deny check` runs advisories, bans, licenses and sources.

[advisories]
# fail on any security advisory or unmaintained/yanked crate
yanked = "deny"
ignore = []

[licenses]
# permissive licenses used across the dependency tree; extend as deps change
allow = [
  "MIT",
  "Apache-2.0",
  "Apache-2.0 WITH LLVM-exception",
  "BSD-2-Clause",
  "BSD-3-Clause",
  "ISC",
  "Unicode-3.0",
  "Unicode-DFS-2016",
  "Zlib",
  "MPL-2.0",
  "CC0-1.0",
  "BSL-1.0",
  "CDLA-Permissive-2.0",
]
confidence-threshold = 0.9

[bans]
multiple-versions = "warn"
# deny external wildcard deps, but allow internal path-based workspace crates
# (rolter-* depend on each other via `workspace = true`, which resolves to "*")
wildcards = "deny"
allow-wildcard-paths = true

[sources]
# only crates.io and the git deps we explicitly vet
unknown-registry = "deny"
unknown-git = "deny"
allow-git = []
