# Optional GPU-backed real-engine compatibility tests (ROL-238).
name: rolter-engines

x-vllm: &vllm
  profiles: [vllm]
  build:
    context: ..
    dockerfile: integration/engines/docker/vllm.Dockerfile
  image: rolter-vllm-uv:v0.24.0
  gpus: all
  shm_size: 2gb
  command: &vllm-command
    - Qwen/Qwen2.5-0.5B-Instruct
    - --served-model-name
    - rolter-dummy
    - --load-format
    - dummy
    - --max-model-len
    - "128"
    - --max-num-seqs
    - "2"
    - --gpu-memory-utilization
    - "0.25"
  volumes:
    - ${HF_HOME:-/tmp/rolter-huggingface}:/root/.cache/huggingface
    - ${UV_CACHE_DIR:-/tmp/rolter-uv-cache}:/root/.cache/uv

x-sglang: &sglang
  profiles: [sglang]
  build:
    context: ..
    dockerfile: integration/engines/docker/sglang.Dockerfile
  image: rolter-sglang-uv:v0.5.12
  gpus: all
  shm_size: 2gb
  command: &sglang-command
    - --model-path
    - Qwen/Qwen2.5-0.5B-Instruct
    - --served-model-name
    - rolter-dummy
    - --load-format
    - dummy
    - --tp-size
    - "1"
    - --context-length
    - "128"
    - --mem-fraction-static
    - "0.25"
    - --disable-overlap-schedule
    - --host
    - 0.0.0.0
    - --port
    - "30000"
  volumes:
    - ${HF_HOME:-/tmp/rolter-huggingface}:/root/.cache/huggingface
    - ${UV_CACHE_DIR:-/tmp/rolter-uv-cache}:/root/.cache/uv

services:
  vllm-1:
    <<: *vllm
    ports: ["${VLLM_1_PORT:-8000}:8000"]
  vllm-2:
    <<: *vllm
    ports: ["${VLLM_2_PORT:-8001}:8000"]
  sglang-1:
    <<: *sglang
    ports: ["${SGLANG_1_PORT:-30000}:30000"]
  sglang-2:
    <<: *sglang
    ports: ["${SGLANG_2_PORT:-30001}:30000"]
