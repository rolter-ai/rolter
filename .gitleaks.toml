title = "rolter gitleaks config"

# use gitleaks' full default ruleset, plus the project allowlist below
[extend]
useDefault = true

[allowlist]
description = "documentation carries placeholder credentials in examples (e.g. the dev virtual key sk-rolter-dev in curl snippets). real secrets come from env vars or the encrypted store and never live in docs, so exempt the docs trees from secret scanning while all code, configs, and examples elsewhere stay covered."
paths = ['''user-docs/.*''', '''docs/.*''']
