# https://release-plz.dev/docs/config
[workspace]
# all crates share the workspace version, so exactly one package (the
# gateway) creates the single v{version} tag and github release — per-package
# tags would collide on the same name (422 on the second crate). the workspace
# version also drives pyproject.toml (maturin reads crates/rolter/Cargo.toml).
# the tag triggers release.yml, which builds maturin wheels; the pypi publish
# step in that workflow is gated behind the PYPI_PUBLISH_ENABLED repo variable.
git_tag_enable = false
git_release_enable = false
dependencies_update = true
# crates.io publishing is enabled: release-plz publishes every workspace member
# in dependency order (rolter-core -> auth/balancer/proxy -> store -> gateway/
# control -> rolter) using CARGO_REGISTRY_TOKEN, gated behind the ROL-103
# quality/security verify job. the `rolter` launcher crate holds the top-level
# name on crates.io (anti-phishing) and is the crate the pypi wheel ships.
publish = true

[[package]]
name = "rolter-gateway"
git_tag_enable = true
git_tag_name = "v{{ version }}"
git_release_enable = true
git_release_name = "v{{ version }}"
