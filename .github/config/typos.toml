# typos (crate-ci/typos) configuration for the GitHub Actions quality gate. the spans below are real words or
# intentional test fixtures the default dictionary flags as misspellings; each
# regex ignores just that literal rather than globally redefining a word.
[default]
extend-ignore-re = [
  # "HashiCorp" (Vault) in the security docs
  "HashiCorp",
  # "mis-enforce" in comments about skipping unknown scopes
  "mis-enforce",
  # "sk-abd": a deliberately-wrong virtual key in the auth verify tests
  "sk-abd",
  # "abc"/"abd": trie test fixtures exercising shared-prefix node counting
  "\"abd\"",
  # canonical W3C traceparent / B3 example ids in the trace tests: hex spans the
  # dictionary reads as words (e.g. "ba" inside a span/trace id)
  "00f067aa0ba902b7",
  "80f198ee56343ba864fe8b2a57d3eff7",
  # DER-encoded local TLS certificates in proxy integration tests: base64 spans
  # happen to form dictionary words.
  "0jAer87tnJgSEHH",
  "QYMBaAFKpTnXjkmXVb",
  "QYMBaAFD7y986Rvr1e",
  "UVkOtC6gn12Y",
]
