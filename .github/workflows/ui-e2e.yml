name: ui e2e (playwright)

# browser-level e2e for the dashboard SPA (#619). heavy (builds + boots the full
# fake-vLLM stack, downloads a browser), so it is NOT part of the default PR
# gate: run it on demand or nightly. fake upstreams only — no secrets.
on:
  workflow_dispatch:
  schedule:
    # nightly at 03:17 UTC
    - cron: "17 3 * * *"

permissions:
  contents: read

env:
  # throwaway AES-256-GCM envelope key for provider api_key sealing (base64 of a
  # readable 32-byte phrase; matches integration/e2e/rolter_e2e/stack.py). never
  # a real secret.
  ROLTER_KEK: cm9sdGVyLWUyZS10ZXN0LWtlay1ub3Qtc2VjcmV0ISE=

jobs:
  e2e:
    name: dashboard journeys
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          persist-credentials: false

      - name: bring up the fake-vLLM stack
        run: |
          docker compose -f integration/e2e/docker-compose.e2e.yml \
            up -d --build --wait --wait-timeout 360

      - uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2.2.0

      - name: install ui deps
        working-directory: ui
        run: bun install --frozen-lockfile

      - name: install chromium (playwright)
        working-directory: ui
        run: bunx playwright install --with-deps chromium

      - name: run e2e
        working-directory: ui
        # the vite dev server (started by playwright) proxies /api -> control:4001
        # and /gw -> gateway:4000, both published by the compose stack
        run: bun run e2e

      - name: upload playwright artifacts
        if: ${{ failure() }}
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: playwright-report
          path: |
            ui/playwright-report
            ui/e2e/.output
          retention-days: 7

      - name: tear down the stack
        if: ${{ always() }}
        run: docker compose -f integration/e2e/docker-compose.e2e.yml down -v --remove-orphans
