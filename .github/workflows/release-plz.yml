name: release-plz

on:
  push:
    branches: [master]

permissions:
  pull-requests: write
  contents: write

concurrency:
  group: release-plz-${{ github.ref }}
  cancel-in-progress: false

jobs:
  # opens / updates the "Release PR": version bumps + changelog from
  # conventional commits. nothing publishes until that PR is merged.
  release-plz-pr:
    name: release-plz pr
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: dtolnay/rust-toolchain@stable
      - name: run release-plz
        uses: release-plz/action@v0.5.130
        with:
          command: release-pr
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}

  # on merge of the release PR: tags `v{version}` and creates the github
  # release. cargo publish is disabled via `publish = false` in
  # release-plz.toml until the workspace is bootstrap-published to crates.io
  # (a first publish fails manifest verification because inter-crate deps
  # resolve against crates.io, where nothing exists yet) and the ROL-103
  # publish gate is in place — both tracked in Linear (Phase 9). The pushed
  # tag triggers release.yml, whose pypi publish step is gated behind the
  # PYPI_PUBLISH_ENABLED repo variable.
  release-plz-release:
    name: release-plz release
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: dtolnay/rust-toolchain@stable
      - name: run release-plz
        uses: release-plz/action@v0.5.130
        with:
          command: release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
