name: release-plz

on:
  push:
    branches: [master]

permissions:
  pull-requests: write
  contents: write

concurrency:
  group: release-plz-${{ github.ref }}
  cancel-in-progress: false

jobs:
  # opens / updates the "Release PR": version bumps + changelog from
  # conventional commits. nothing publishes until that PR is merged.
  release-plz-pr:
    name: release-plz pr
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: dtolnay/rust-toolchain@stable
      - name: run release-plz
        uses: release-plz/action@v0.5.130
        with:
          command: release-pr
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}

  # on merge of the release PR: publishes every workspace member to crates.io
  # in dependency order (`publish = true` in release-plz.toml, using
  # CARGO_REGISTRY_TOKEN), tags `v{version}` and creates the github release.
  # the pushed tag triggers release.yml, whose pypi publish step is gated
  # behind the PYPI_PUBLISH_ENABLED repo variable.
  # same quality/security gate as CI, on the merge commit that would be
  # tagged/published. release-plz-release needs this so cargo publish cannot
  # run on an unverified commit (ROL-103).
  verify:
    uses: ./.github/workflows/quality.yml

  release-plz-release:
    name: release-plz release
    needs: verify
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: dtolnay/rust-toolchain@stable
      - name: run release-plz
        uses: release-plz/action@v0.5.130
        with:
          command: release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
