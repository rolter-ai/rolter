name: release-plz

on:
  push:
    branches: [master]

# least-privilege default; only the two release-plz jobs need write (the
# `verify` reusable call runs read-only), so the write grant lives per-job below
permissions:
  contents: read

concurrency:
  group: release-plz-${{ github.ref }}
  cancel-in-progress: false

jobs:
  # opens / updates the "Release PR": version bumps + changelog from
  # conventional commits. nothing publishes until that PR is merged.
  release-plz-pr:
    name: release-plz pr
    runs-on: ubuntu-latest
    permissions:
      contents: write # push the release branch
      pull-requests: write # open/update the release PR
    steps:
      # release-plz pushes the release branch with the persisted token, so
      # persist-credentials must stay on here
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7 # zizmor: ignore[artipacked]
        with:
          fetch-depth: 0
      - uses: dtolnay/rust-toolchain@4be7066ada62dd38de10e7b70166bc74ed198c30 # stable
        with:
          toolchain: stable
      - name: run release-plz
        uses: release-plz/action@e8792575c7f2366cf6ff3ccc33ead9ace5b691c7 # v0.5.130
        with:
          command: release-pr
          config: .github/config/release-plz.toml
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}

  # on merge of the release PR: publishes every workspace member to crates.io
  # in dependency order (`publish = true` in .github/config/release-plz.toml, using
  # CARGO_REGISTRY_TOKEN), tags `v{version}` and creates the github release.
  # the pushed tag triggers release.yml, whose pypi publish step is gated
  # behind the PYPI_PUBLISH_ENABLED repo variable.
  # same quality/security gate as CI, on the merge commit that would be
  # tagged/published. release-plz-release needs this so cargo publish cannot
  # run on an unverified commit (ROL-103).
  verify:
    uses: ./.github/workflows/quality.yml

  release-plz-release:
    name: release-plz release
    needs: verify
    runs-on: ubuntu-latest
    permissions:
      contents: write # push tags + create the github release
      pull-requests: write # release-plz reconciles the release PR state
    steps:
      # release-plz pushes tags with the persisted token, so persist-credentials
      # must stay on here
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7 # zizmor: ignore[artipacked]
        with:
          fetch-depth: 0
      - uses: dtolnay/rust-toolchain@4be7066ada62dd38de10e7b70166bc74ed198c30 # stable
        with:
          toolchain: stable
      - name: run release-plz
        uses: release-plz/action@e8792575c7f2366cf6ff3ccc33ead9ace5b691c7 # v0.5.130
        with:
          command: release
          config: .github/config/release-plz.toml
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
