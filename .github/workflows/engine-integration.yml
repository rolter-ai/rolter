name: engine integration

on:
  pull_request:
    paths:
      - "docker/docker-compose.engines.yml"
      - "integration/engines/**"
      - "justfile"
      - ".github/workflows/engine-integration.yml"
  workflow_dispatch:
    inputs:
      benchmark:
        description: Run the non-gating direct-vs-rolter benchmark too
        required: false
        type: boolean
        default: false
  schedule:
    - cron: "23 3 * * 1"

permissions:
  contents: read

jobs:
  smoke:
    name: ${{ matrix.engine }} dummy-weight smoke
    # CPU-only on GitHub-hosted runners: this is an API/SSE compatibility test,
    # not an inference-engine performance benchmark.
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        engine: [vllm]
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          persist-credentials: false
      - uses: dtolnay/rust-toolchain@4be7066ada62dd38de10e7b70166bc74ed198c30 # stable
        with:
          toolchain: stable
      - name: set up Docker Buildx
        uses: docker/setup-buildx-action@8d2750c68a42422c14e847fe6c8ac0403b4cbd6f # v3
      - name: build cached vLLM CPU image
        if: matrix.engine == 'vllm'
        uses: docker/build-push-action@10e90e3645eae34f1e60eeb005ba3a3d33f178e8 # v6
        with:
          context: .
          file: integration/engines/docker/vllm-cpu.Dockerfile
          load: true
          tags: rolter-vllm-cpu:v0.24.0
          cache-from: type=gha,scope=rolter-vllm-cpu
          cache-to: type=gha,mode=max,scope=rolter-vllm-cpu
      - name: smoke through rolter
        run: integration/engines/run.sh ${{ matrix.engine }}
      - name: optional benchmark
        if: github.event_name == 'workflow_dispatch' && inputs.benchmark
        run: just bench-${{ matrix.engine }}
      - name: upload logs and benchmark artifacts
        if: always()
        uses: actions/upload-artifact@65c4c4a1ddee5b72f698fdd19549f0f0fb45cf08 # v4.6.0
        with:
          name: ${{ matrix.engine }}-artifacts
          path: artifacts/engines/${{ matrix.engine }}
          if-no-files-found: warn
