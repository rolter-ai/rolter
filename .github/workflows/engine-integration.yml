name: engine integration

on:
  pull_request:
    paths:
      - "docker/docker-compose.engines.yml"
      - "integration/engines/**"
      - "justfile"
      - ".github/workflows/engine-integration.yml"
  workflow_dispatch:
    inputs:
      benchmark:
        description: Run the non-gating direct-vs-rolter benchmark too
        required: false
        type: boolean
        default: false
  schedule:
    - cron: "23 3 * * 1"

permissions:
  contents: read

jobs:
  smoke:
    name: ${{ matrix.engine }} dummy-weight smoke
    # CPU-only on GitHub-hosted runners: this is an API/SSE compatibility test,
    # not an inference-engine performance benchmark.
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        engine: [vllm, sglang]
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          persist-credentials: false
      - uses: dtolnay/rust-toolchain@4be7066ada62dd38de10e7b70166bc74ed198c30 # stable
        with:
          toolchain: stable
      - name: smoke through rolter
        run: integration/engines/run.sh ${{ matrix.engine }}
      - name: optional benchmark
        if: github.event_name == 'workflow_dispatch' && inputs.benchmark
        run: just bench-${{ matrix.engine }}
      - name: upload logs and benchmark artifacts
        if: always()
        uses: actions/upload-artifact@65c4c4a1ddee5b72f698fdd19549f0f0fb45cf08 # v4.6.0
        with:
          name: ${{ matrix.engine }}-artifacts
          path: artifacts/engines/${{ matrix.engine }}
          if-no-files-found: warn
