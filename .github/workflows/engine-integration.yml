name: engine integration

# the default engine is a lightweight vLLM API simulator (llm-d-inference-sim),
# cheap enough to run as a normal PR check; dispatch with engine=vllm to smoke
# the real CPU engine on demand
on:
  pull_request:
    paths:
      - "docker/docker-compose.engines.yml"
      - "integration/engines/**"
      - "justfile"
      - ".github/workflows/engine-integration.yml"
  workflow_dispatch:
    inputs:
      engine:
        description: Engine to smoke through rolter
        required: false
        type: choice
        options: [sim, vllm]
        default: sim
      benchmark:
        description: Run the non-gating direct-vs-rolter benchmark too
        required: false
        type: boolean
        default: false

permissions:
  contents: read

jobs:
  smoke:
    name: ${{ inputs.engine || 'sim' }} smoke
    # CPU-only on GitHub-hosted runners: this is an API/SSE compatibility test,
    # not an inference-engine performance benchmark.
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - uses: dtolnay/rust-toolchain@4cda84d5c5c54efe2404f9d843567869ab1699d4 # stable
        with:
          toolchain: stable
      # nothing built here is published, so the cache cannot poison a release
      - uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1 # zizmor: ignore[cache-poisoning]
      - name: set up Docker Buildx
        if: (inputs.engine || 'sim') == 'vllm'
        uses: docker/setup-buildx-action@bb05f3f5519dd87d3ba754cc423b652a5edd6d2c # v4.2.0
      - name: build cached vLLM CPU image
        if: (inputs.engine || 'sim') == 'vllm'
        uses: docker/build-push-action@53b7df96c91f9c12dcc8a07bcb9ccacbed38856a # v7.3.0
        with:
          context: .
          file: integration/engines/docker/vllm-cpu.Dockerfile
          load: true
          tags: rolter-vllm-cpu:v0.24.0
          cache-from: type=gha,scope=rolter-vllm-cpu
          cache-to: type=gha,mode=max,scope=rolter-vllm-cpu
      # --bench runs the smoke assertions first, so one invocation covers both
      - name: smoke through rolter
        run: integration/engines/run.sh ${{ inputs.engine || 'sim' }} ${{ github.event_name == 'workflow_dispatch' && inputs.benchmark && '--bench' || '' }}
      - name: upload logs and benchmark artifacts
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: ${{ inputs.engine || 'sim' }}-artifacts
          path: artifacts/engines/${{ inputs.engine || 'sim' }}
          if-no-files-found: warn
