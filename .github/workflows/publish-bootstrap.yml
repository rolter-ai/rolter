name: publish-bootstrap

# one-shot manual bootstrap: publishes every workspace member to crates.io in
# dependency order. needed because the workspace is half-published (only
# rolter-core@0.0.1 exists) while the v0.0.2 tag already exists, which blocks
# release-plz's automated `release` command. after this runs once and all
# crates exist at the workspace version, release-plz takes over for future
# releases and this workflow can be deleted.
#
# trigger from the Actions tab (or `gh workflow run publish-bootstrap.yml`).
# `cargo publish` blocks until each crate is queryable in the index before
# returning, so publishing dependents in sequence is safe.

on:
  workflow_dispatch:
    inputs:
      dry_run:
        description: "package/verify only, do not upload"
        type: boolean
        default: false

# publishing authenticates to crates.io via CARGO_REGISTRY_TOKEN, not the
# GITHUB_TOKEN — least-privilege read is all this workflow needs.
permissions:
  contents: read

concurrency:
  group: publish-bootstrap
  cancel-in-progress: false

jobs:
  # reuse the same fmt/clippy/test/cargo-deny gate as CI/release so a broken
  # commit can never be bootstrap-published (ROL-103).
  verify:
    uses: ./.github/workflows/quality.yml
    secrets:
      GITLEAKS_LICENSE: ${{ secrets.GITLEAKS_LICENSE }}

  publish:
    needs: verify
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - uses: dtolnay/rust-toolchain@4cda84d5c5c54efe2404f9d843567869ab1699d4 # stable
        with:
          toolchain: stable
      - name: cargo publish in dependency order
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
          DRY_RUN: ${{ inputs.dry_run }}
        run: |
          set -euo pipefail
          # all members share the workspace version
          version="$(cargo metadata --no-deps --format-version 1 \
            | python3 -c 'import json,sys; print(json.load(sys.stdin)["packages"][0]["version"])')"
          echo "workspace version: $version"
          flags="--no-verify"
          [ "$DRY_RUN" = "true" ] && flags="--dry-run"
          for crate in \
            rolter-core \
            rolter-auth \
            rolter-balancer \
            rolter-proxy \
            rolter-store \
            rolter-gateway \
            rolter-control \
            rolter; do
            echo "::group::publish $crate"
            # skip if this exact version already exists so the job is
            # re-runnable after a partial failure (e.g. rolter-core@0.0.1)
            code="$(curl -s -H 'User-Agent: rolter-ci (release)' \
              -o /dev/null -w '%{http_code}' \
              "https://crates.io/api/v1/crates/$crate/$version")"
            if [ "$code" = "200" ]; then
              echo "$crate@$version already on crates.io; skipping"
              echo "::endgroup::"; continue
            fi
            # --no-verify skips the per-crate rebuild (already covered by the
            # verify job) so a dependent doesn't fail verification before its
            # dep has propagated to the index. cargo publish blocks until the
            # crate is queryable, so the next iteration finds it.
            cargo publish -p "$crate" $flags
            echo "$crate@$version: published"
            echo "::endgroup::"
          done
