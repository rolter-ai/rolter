name: release

on:
  push:
    tags:
      - "v*"
  # release-plz creates release tags with the repo GITHUB_TOKEN, and GitHub
  # suppresses downstream push events for token-created refs, so a release-plz
  # tag never fires the push trigger above. dispatch from the default branch
  # with the tag to ship it: `gh workflow run release.yml -f tag=vX.Y.Z`.
  workflow_dispatch:
    inputs:
      tag:
        description: "release tag to build and publish, e.g. v0.0.3"
        required: true
        type: string

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  # ── quality/security gate ───────────────────────────────────────────────────
  # runs the same fmt/clippy/test/cargo-deny pipeline as CI on the tagged
  # commit. publish-pypi needs this, so a tag whose code fails verification
  # never ships.
  verify:
    uses: ./.github/workflows/quality.yml

  # asserts the external app-provided checks (CodeQL, secret scanning) reported
  # success for this commit. fail-closed: pending or missing checks block the
  # publish. required check names are configurable via the
  # RELEASE_REQUIRED_CHECKS repo variable (comma-separated); defaults cover
  # CodeQL + GitGuardian.
  verify-external-checks:
    name: assert external checks green
    runs-on: ubuntu-latest
    permissions:
      checks: read
      contents: read
    steps:
      - name: assert required check-runs succeeded
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO: ${{ github.repository }}
          REF: ${{ inputs.tag || github.sha }}
          REQUIRED: ${{ vars.RELEASE_REQUIRED_CHECKS || 'CodeQL,GitGuardian Security Checks' }}
        run: |
          set -euo pipefail
          # resolve the ref (tag on dispatch, sha on push) to a commit sha
          SHA="$(gh api "repos/$REPO/commits/$REF" -q '.sha')"
          runs="$(gh api "repos/$REPO/commits/$SHA/check-runs" --paginate \
            -q '.check_runs[] | "\(.name)\t\(.status)\t\(.conclusion)"')"
          echo "check-runs for $SHA:"; echo "$runs"
          fail=0
          IFS=',' read -ra names <<< "$REQUIRED"
          for name in "${names[@]}"; do
            name="$(echo "$name" | sed 's/^ *//;s/ *$//')"
            [ -z "$name" ] && continue
            line="$(echo "$runs" | grep -F -m1 "$(printf '%s\t' "$name")" || true)"
            if [ -z "$line" ]; then
              echo "::error::required check '$name' not found for $SHA (fail-closed)"; fail=1; continue
            fi
            status="$(echo "$line" | cut -f2)"; conclusion="$(echo "$line" | cut -f3)"
            if [ "$status" != "completed" ] || [ "$conclusion" != "success" ]; then
              echo "::error::required check '$name' status=$status conclusion=$conclusion (need completed/success)"; fail=1
            fi
          done
          exit $fail

  # ── build maturin wheels ────────────────────────────────────────────────────
  build-wheels:
    name: build wheel (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    steps:
      - uses: actions/checkout@v7
        with:
          ref: ${{ inputs.tag || github.ref }}

      - name: build wheels (linux)
        if: matrix.os == 'ubuntu-latest'
        uses: PyO3/maturin-action@v1
        with:
          command: build
          args: --release --out dist --manifest-path crates/rolter/Cargo.toml
          manylinux: auto
          target: x86_64

      - name: build wheels (linux aarch64)
        if: matrix.os == 'ubuntu-latest'
        uses: PyO3/maturin-action@v1
        env:
          # the manylinux2014 aarch64 cross toolchain drives ring's perlasm
          # through a gas that doesn't predefine __ARM_ARCH, so ring's build
          # aborts ("ARM assembler must define __ARM_ARCH"); define it here
          CFLAGS_aarch64_unknown_linux_gnu: "-D__ARM_ARCH=8"
        with:
          command: build
          args: --release --out dist --manifest-path crates/rolter/Cargo.toml
          manylinux: auto
          target: aarch64

      - name: build wheels (macos / windows)
        if: matrix.os != 'ubuntu-latest'
        uses: PyO3/maturin-action@v1
        with:
          command: build
          args: --release --out dist --manifest-path crates/rolter/Cargo.toml

      - name: upload wheels
        uses: actions/upload-artifact@v4
        with:
          name: wheels-${{ matrix.os }}
          path: dist/

  # ── publish to PyPI ─────────────────────────────────────────────────────────
  # fail-closed: publishes only when the PYPI_PUBLISH_ENABLED repo variable is
  # set to "true" AND the verify + external-check gates pass for the tagged
  # commit (ROL-103). wheels still build above as a release artifact regardless.
  publish-pypi:
    name: publish to pypi
    if: vars.PYPI_PUBLISH_ENABLED == 'true'
    needs: [verify, verify-external-checks, build-wheels]
    runs-on: ubuntu-latest
    environment:
      name: pypi
      url: https://pypi.org/project/rolter/
    permissions:
      id-token: write  # trusted publishing (OIDC)
    steps:
      - name: download all wheels
        uses: actions/download-artifact@v4
        with:
          pattern: wheels-*
          merge-multiple: true
          path: dist/

      - name: publish to pypi
        uses: PyO3/maturin-action@v1
        with:
          command: upload
          args: --non-interactive --skip-existing dist/*
