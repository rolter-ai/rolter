name: ci

on:
  push:
    branches: [master, main]
  # `edited` lets a title-only fix retrigger the cheap pr-title check without a
  # new commit; the full `quality` gate skips that event (see its `if:` below)
  pull_request:
    types: [opened, synchronize, reopened, edited]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

# least-privilege GITHUB_TOKEN by default; jobs widen their own scope as needed.
permissions:
  contents: read

jobs:
  # full quality/security gate (fmt, clippy, nextest, doc tests, feature matrix,
  # cargo doc, cargo-deny, gitleaks, actionlint, ui, smoke, + informational
  # checks). shared with the release paths via workflow_call so publish and CI
  # enforce the exact same checks on a commit.
  quality:
    # a title-only edit reruns pr-title/ci-ok only; the heavy gate already ran
    # on this commit and never needs re-running for a metadata change
    if: github.event.action != 'edited'
    uses: ./.github/workflows/quality.yml
    secrets:
      GITLEAKS_LICENSE: ${{ secrets.GITLEAKS_LICENSE }}

  pr-title:
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: read
    steps:
      - name: validate conventional commit pr title
        uses: amannn/action-semantic-pull-request@48f256284bd46cdaab1048c3721360e808335d50 # v6.1.1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          types: |
            feat
            fix
            perf
            refactor
            docs
            test
            build
            ci
            chore
            revert
          scopes: |
            gateway
            balancer
            proxy
            core
            store
            auth
            control
            ui
            docs
            infra
            ci
            deps
            release
          requireScope: false

  # single aggregating gate for branch protection. mark ONLY `ci-ok` as a
  # required status check on master; it turns green only when the quality
  # workflow and pr-title both succeed (a skipped pr-title on push is fine).
  # adding/removing jobs inside quality.yml then never requires touching branch
  # protection settings. see ROL-124.
  ci-ok:
    name: ci-ok
    if: always()
    needs: [quality, pr-title]
    runs-on: ubuntu-latest
    steps:
      - name: assert required jobs succeeded
        run: |
          set -euo pipefail
          echo "quality:  ${{ needs.quality.result }}"
          echo "pr-title: ${{ needs.pr-title.result }}"
          echo "action:   ${GITHUB_EVENT_ACTION}"
          # quality must succeed; pr-title may be skipped (push builds) but must
          # not have failed. on a title-only `edited` event the heavy gate is
          # intentionally skipped (it already ran on this commit), so a skipped
          # quality is acceptable there and only pr-title is re-evaluated
          if [ "${GITHUB_EVENT_ACTION}" = "edited" ]; then
            if [ "${{ needs.quality.result }}" != "success" ] \
               && [ "${{ needs.quality.result }}" != "skipped" ]; then
              echo "::error::quality gate did not pass"
              exit 1
            fi
          elif [ "${{ needs.quality.result }}" != "success" ]; then
            echo "::error::quality gate did not pass"
            exit 1
          fi
          if [ "${{ needs.pr-title.result }}" = "failure" ]; then
            echo "::error::pr-title check failed"
            exit 1
          fi
          echo "all required checks green"
        env:
          GITHUB_EVENT_ACTION: ${{ github.event.action }}
