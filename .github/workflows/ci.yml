name: ci

on:
  push:
    branches: [master, main]
  pull_request:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # full quality/security gate (fmt, clippy incl. postgres feature, test,
  # cargo-deny). shared with the release paths via workflow_call so publish
  # and CI enforce the exact same checks on a commit.
  quality:
    uses: ./.github/workflows/quality.yml

  pr-title:
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - name: validate conventional commit pr title
        uses: amannn/action-semantic-pull-request@v5
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          types: |
            feat
            fix
            perf
            refactor
            docs
            test
            build
            ci
            chore
            revert
          scopes: |
            gateway
            balancer
            proxy
            core
            store
            auth
            control
            ui
            docs
            infra
            ci
            deps
            release
          requireScope: false
