name: quality

# reusable quality/security gate. run standalone from ci.yml on every push/pr
# and via workflow_call from the release paths so nothing publishes on a commit
# whose tests, lint or supply-chain check has not passed.
#
# most development in this repo is done by AI agents, so CI is the strongest
# reviewer: many independent checks. jobs are split so a failure points at one
# concern. ci.yml aggregates every job here (plus pr-title) into a single
# `ci-ok` check for branch protection. some newer/heavier checks run as
# informational (continue-on-error) until their baseline is trusted, then get
# promoted to blocking — see ROL-124.
on:
  workflow_call:

# least-privilege GITHUB_TOKEN: every job here only reads the checked-out repo.
# a reusable workflow cannot exceed the caller's grant, but declaring it here
# keeps the default scope tight and satisfies the CodeQL actions query.
permissions:
  contents: read

# faster linking on the linux runner; writes ~/.cargo/config.toml to use the
# wild linker for *-unknown-linux-{gnu,musl}. pinned to the 0.9.0 commit sha.
env:
  WILD_ACTION_SHA: 0bbbfa5df4380cab8e63cb8505a1ce65e1d10203

jobs:
  # ── rust: format + lint ─────────────────────────────────────────────────────
  fmt-clippy:
    name: fmt / clippy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
      - uses: dtolnay/rust-toolchain@4be7066ada62dd38de10e7b70166bc74ed198c30 # stable
        with:
          toolchain: stable
          components: rustfmt, clippy
      - uses: wild-linker/action@0bbbfa5df4380cab8e63cb8505a1ce65e1d10203 # 0.9.0
      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2
      - name: fmt
        run: cargo fmt --all --check
      - name: clippy (default features)
        run: cargo clippy --workspace --all-targets -- -D warnings
      - name: clippy (postgres feature)
        run: cargo clippy -p rolter-store --all-targets --features postgres -- -D warnings

  # ── rust: tests ─────────────────────────────────────────────────────────────
  # nextest for the unit/integration tests (per-test isolation, faster) plus an
  # explicit doc-test pass since nextest does not run doc tests.
  test:
    name: nextest / doctests
    runs-on: ubuntu-latest
    # a real postgres so the store + control-plane integration tests actually
    # run (they self-skip when ROLTER_TEST_DATABASE_URL is unset) rather than
    # passing as silent no-ops
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: rolter_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    env:
      ROLTER_TEST_DATABASE_URL: postgres://postgres:postgres@localhost:5432/rolter_test
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
      - uses: dtolnay/rust-toolchain@4be7066ada62dd38de10e7b70166bc74ed198c30 # stable
        with:
          toolchain: stable
      - uses: wild-linker/action@0bbbfa5df4380cab8e63cb8505a1ce65e1d10203 # 0.9.0
      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2
      - uses: taiki-e/install-action@2ca9b94c269419b7b0c711c09d0b21c4e1d51145 # v2.83.1
        with:
          tool: nextest
      - name: nextest (workspace, all features)
        run: cargo nextest run --workspace --all-features
      - name: doc tests
        run: cargo test --doc --workspace --all-features

  # ── rust: non-default feature builds ────────────────────────────────────────
  # agents frequently break builds behind a cargo feature; check each in turn.
  feature-matrix:
    name: feature matrix
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
      - uses: dtolnay/rust-toolchain@4be7066ada62dd38de10e7b70166bc74ed198c30 # stable
        with:
          toolchain: stable
      - uses: wild-linker/action@0bbbfa5df4380cab8e63cb8505a1ce65e1d10203 # 0.9.0
      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2
      - uses: taiki-e/install-action@2ca9b94c269419b7b0c711c09d0b21c4e1d51145 # v2.83.1
        with:
          tool: cargo-hack
      - name: cargo hack (each feature)
        run: cargo hack check --each-feature --workspace --all-targets

  # ── rust: doc warnings ──────────────────────────────────────────────────────
  # broken intra-doc links / invalid rustdoc are common agent mistakes.
  docs:
    name: cargo doc (warnings = errors)
    runs-on: ubuntu-latest
    env:
      RUSTDOCFLAGS: "-D warnings"
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
      - uses: dtolnay/rust-toolchain@4be7066ada62dd38de10e7b70166bc74ed198c30 # stable
        with:
          toolchain: stable
      - uses: wild-linker/action@0bbbfa5df4380cab8e63cb8505a1ce65e1d10203 # 0.9.0
      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2
      - name: cargo doc
        run: cargo doc --workspace --no-deps --all-features

  # ── supply chain: advisories / bans / licenses / sources ────────────────────
  supply-chain:
    name: cargo-deny
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
      - name: cargo-deny (advisories, bans, licenses, sources)
        uses: EmbarkStudios/cargo-deny-action@bb137d7af7e4fb67e5f82a49c4fce4fad40782fe # v2
        with:
          # deny.toml lives under .config/; --config is a `check` subcommand
          # arg, so it must go via command-arguments (placed after the command)
          command: check
          command-arguments: "--config .config/deny.toml"

  # ── supply chain: secret scanning ───────────────────────────────────────────
  # agents must never leak a provider key; fail the build if one is committed.
  gitleaks:
    name: gitleaks
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          fetch-depth: 0
      - uses: gitleaks/gitleaks-action@ff98106e4c7b2bc287b24eaf42907196329070c7 # v2
        env:
          GITHUB_TOKEN: ${{ github.token }}

  # ── workflow lint: validate the CI yaml itself ──────────────────────────────
  # agents edit workflows too; catch syntax and shell smells early.
  actionlint:
    name: actionlint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
      - name: actionlint
        uses: raven-actions/actionlint@3d39aea434753780c3b3d4a1a31c854b4dbf49d7 # v2

  # ── workflow security: zizmor static analysis ───────────────────────────────
  # catches workflow security smells (unpinned actions, template injection in
  # run:, over-broad GITHUB_TOKEN). informational for now; promote to blocking
  # once the baseline is clean.
  zizmor:
    name: zizmor (informational)
    runs-on: ubuntu-latest
    continue-on-error: true
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
      - name: install zizmor
        run: pipx install zizmor
      - name: zizmor
        run: zizmor --persona=regular .github/workflows/
        env:
          GH_TOKEN: ${{ github.token }}

  # ── ui: typecheck + production build ────────────────────────────────────────
  ui:
    name: ui lint / build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ui
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
      - uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2
      - name: install
        run: bun install --frozen-lockfile
      - name: lint (tsc --noEmit)
        run: bun run lint
      - name: build
        run: bun run build

  # ── smoke: run the gateway and hit it end-to-end ────────────────────────────
  # boots the real binary and exercises the built-in fake-llm (no upstream or
  # secrets needed), catching wiring regressions no unit test sees.
  smoke:
    name: gateway smoke (fake-llm)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
      - uses: dtolnay/rust-toolchain@4be7066ada62dd38de10e7b70166bc74ed198c30 # stable
        with:
          toolchain: stable
      - uses: wild-linker/action@0bbbfa5df4380cab8e63cb8505a1ce65e1d10203 # 0.9.0
      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2
      - name: build gateway
        run: cargo build -p rolter-gateway
      - name: boot + probe
        run: |
          set -euo pipefail
          # no config file: the gateway starts open with the built-in fake-llm
          ./target/debug/rolter-gateway --config /nonexistent.toml &
          pid=$!
          trap 'kill "$pid" 2>/dev/null || true' EXIT
          # wait for the listener
          for _ in $(seq 1 30); do
            if curl -fsS http://127.0.0.1:4000/healthz >/dev/null 2>&1; then break; fi
            sleep 1
          done
          echo "== /healthz =="
          curl -fsS http://127.0.0.1:4000/healthz
          echo "== /v1/models =="
          curl -fsS http://127.0.0.1:4000/v1/models
          echo "== fake-llm chat (non-streaming) =="
          curl -fsS http://127.0.0.1:4000/v1/chat/completions \
            -H 'content-type: application/json' \
            -d '{"model":"fake-llm","messages":[{"role":"user","content":"hi"}]}' \
            | tee /tmp/resp.json
          grep -q '"choices"' /tmp/resp.json
          echo "== fake-llm chat (streaming) =="
          curl -fsS -N http://127.0.0.1:4000/v1/chat/completions \
            -H 'content-type: application/json' \
            -d '{"model":"fake-llm","stream":true,"messages":[{"role":"user","content":"hi"}]}' \
            | grep -q 'data:'

  # ── spelling: docs / comments / identifiers ─────────────────────────────────
  # false positives are pinned in _typos.toml with an explaining comment each.
  typos:
    name: typos
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
      - uses: crate-ci/typos@3bc303c295c081add5df4a4d52a1e117f2fb2dce # master

  # ── unused dependencies ─────────────────────────────────────────────────────
  machete:
    name: unused deps
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
      - uses: bnjbvr/cargo-machete@ec7059328c4929414d52d0b9734e682239f6cc6c # main

  # ── informational checks ────────────────────────────────────────────────────
  # non-blocking for now (continue-on-error); promote to required once their
  # baseline is understood. see the required-checks policy in ROL-124.

  coverage:
    name: coverage (informational)
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
      - uses: dtolnay/rust-toolchain@4be7066ada62dd38de10e7b70166bc74ed198c30 # stable
        with:
          toolchain: stable
          components: llvm-tools-preview
      - uses: wild-linker/action@0bbbfa5df4380cab8e63cb8505a1ce65e1d10203 # 0.9.0
      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2
      - uses: taiki-e/install-action@2ca9b94c269419b7b0c711c09d0b21c4e1d51145 # v2.83.1
        with:
          tool: cargo-llvm-cov
      - name: cargo llvm-cov
        run: cargo llvm-cov --workspace --all-features --summary-only

  # ── toml formatting: Cargo.toml / rolter.toml / deny.toml ───────────────────
  # blocking: the whole tree is taplo-formatted, so any drift is a real diff.
  taplo:
    name: taplo fmt
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
      - uses: taiki-e/install-action@2ca9b94c269419b7b0c711c09d0b21c4e1d51145 # v2.83.1
        with:
          tool: taplo
      - name: taplo fmt --check
        run: taplo fmt --check --diff

  # ── MSRV: build on the pinned minimum supported rust version ─────────────────
  # agents can silently adopt newer-than-declared language features; this catches
  # it against `rust-version` in Cargo.toml. informational until the baseline is
  # green on the pinned toolchain.
  msrv:
    name: msrv build (informational)
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
      - uses: dtolnay/rust-toolchain@633be07371d2bfc430534a728ba2e67cd3082b78 # 1.82.0
        with:
          toolchain: 1.82.0
      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2
      - name: cargo check (msrv)
        run: cargo check --workspace --all-features

  # ── cross-platform: check the workspace builds off linux ────────────────────
  # linux is covered by every job above; macOS catches os-specific breakage.
  # informational for now (adds runner minutes); promote if it earns its keep.
  cross-platform:
    name: macos check (informational)
    runs-on: macos-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
      - uses: dtolnay/rust-toolchain@4be7066ada62dd38de10e7b70166bc74ed198c30 # stable
        with:
          toolchain: stable
      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2
      - name: cargo check (macos)
        run: cargo check --workspace --all-features

  # ── semver: no accidental breaking API change in published crates ───────────
  # meaningful once crates are published (ROL-117); informational until a
  # baseline version exists on crates.io to diff against.
  semver-checks:
    name: semver-checks (informational)
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
      - uses: dtolnay/rust-toolchain@4be7066ada62dd38de10e7b70166bc74ed198c30 # stable
        with:
          toolchain: stable
      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2
      - uses: obi1kenobi/cargo-semver-checks-action@6b69fcf40e9b5fb17adeb57e4b6ecd020649a239 # v2
