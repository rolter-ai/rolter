name: quality

# reusable quality/security gate. run standalone from ci.yml on every push/pr
# and via workflow_call from the release paths so nothing publishes on a commit
# whose tests, lint or supply-chain check has not passed.
#
# most development in this repo is done by AI agents, so CI is the strongest
# reviewer: many independent checks. jobs are split so a failure points at one
# concern. ci.yml aggregates every job here (plus pr-title) into a single
# `ci-ok` check for branch protection. some newer/heavier checks run as
# informational (continue-on-error) until their baseline is trusted, then get
# promoted to blocking — see ROL-124.
on:
  workflow_call:
    # reusable workflows do not inherit caller secrets automatically. the gitleaks
    # job needs a license because the repo is org-owned; each caller passes it
    # explicitly (least-privilege — no `secrets: inherit`). optional so callers
    # that predate the secret still validate; gitleaks then fails loudly.
    secrets:
      GITLEAKS_LICENSE:
        required: false

# least-privilege GITHUB_TOKEN: every job here only reads the checked-out repo.
# a reusable workflow cannot exceed the caller's grant, but declaring it here
# keeps the default scope tight and satisfies the CodeQL actions query.
permissions:
  contents: read

# faster linking on the linux runner; writes ~/.cargo/config.toml to use the
# wild linker for *-unknown-linux-{gnu,musl}. pinned to the 0.9.0 commit sha.
env:
  WILD_ACTION_SHA: 0bbbfa5df4380cab8e63cb8505a1ce65e1d10203

jobs:
  # ── rust: format + lint ─────────────────────────────────────────────────────
  fmt-clippy:
    name: fmt / clippy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          persist-credentials: false
      - uses: dtolnay/rust-toolchain@4be7066ada62dd38de10e7b70166bc74ed198c30 # stable
        with:
          toolchain: stable
          components: rustfmt, clippy
      - uses: wild-linker/action@0bbbfa5df4380cab8e63cb8505a1ce65e1d10203 # 0.9.0
      - uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1
      - name: fmt
        run: cargo fmt --all --check
      - name: clippy (default features)
        run: cargo clippy --workspace --all-targets -- -D warnings
      - name: clippy (postgres feature)
        run: cargo clippy -p rolter-store --all-targets --features postgres -- -D warnings

  # ── rust: tests ─────────────────────────────────────────────────────────────
  # nextest for the unit/integration tests (per-test isolation, faster) plus an
  # explicit doc-test pass since nextest does not run doc tests.
  test:
    name: nextest / doctests
    runs-on: ubuntu-latest
    # a real postgres so the store + control-plane integration tests actually
    # run (they self-skip when ROLTER_TEST_DATABASE_URL is unset) rather than
    # passing as silent no-ops
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: rolter_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    env:
      ROLTER_TEST_DATABASE_URL: postgres://postgres:postgres@localhost:5432/rolter_test
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          persist-credentials: false
      - uses: dtolnay/rust-toolchain@4be7066ada62dd38de10e7b70166bc74ed198c30 # stable
        with:
          toolchain: stable
      - uses: wild-linker/action@0bbbfa5df4380cab8e63cb8505a1ce65e1d10203 # 0.9.0
      - uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1
      - uses: taiki-e/install-action@43aecc8d72668fbcfe75c31400bc4f890f1c5853 # v2.83.2
        with:
          tool: nextest
      - name: nextest (workspace, all features)
        run: cargo nextest run --workspace --all-features
      - name: doc tests
        run: cargo test --doc --workspace --all-features

  # ── rust: non-default feature builds ────────────────────────────────────────
  # agents frequently break builds behind a cargo feature; check each in turn.
  feature-matrix:
    name: feature matrix
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          persist-credentials: false
      - uses: dtolnay/rust-toolchain@4be7066ada62dd38de10e7b70166bc74ed198c30 # stable
        with:
          toolchain: stable
      - uses: wild-linker/action@0bbbfa5df4380cab8e63cb8505a1ce65e1d10203 # 0.9.0
      - uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1
      - uses: taiki-e/install-action@43aecc8d72668fbcfe75c31400bc4f890f1c5853 # v2.83.2
        with:
          tool: cargo-hack
      - name: cargo hack (each feature)
        run: cargo hack check --each-feature --workspace --all-targets

  # ── rust: doc warnings ──────────────────────────────────────────────────────
  # broken intra-doc links / invalid rustdoc are common agent mistakes.
  docs:
    name: cargo doc (warnings = errors)
    runs-on: ubuntu-latest
    env:
      RUSTDOCFLAGS: "-D warnings"
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          persist-credentials: false
      - uses: dtolnay/rust-toolchain@4be7066ada62dd38de10e7b70166bc74ed198c30 # stable
        with:
          toolchain: stable
      - uses: wild-linker/action@0bbbfa5df4380cab8e63cb8505a1ce65e1d10203 # 0.9.0
      - uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1
      - name: cargo doc
        run: cargo doc --workspace --no-deps --all-features

  # ── supply chain: advisories / bans / licenses / sources ────────────────────
  supply-chain:
    name: cargo-deny
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          persist-credentials: false
      - name: cargo-deny (advisories, bans, licenses, sources)
        uses: taiki-e/install-action@43aecc8d72668fbcfe75c31400bc4f890f1c5853 # v2.83.2
        with:
          tool: cargo-deny@0.20.2
      - name: cargo deny check
        run: cargo deny --all-features --config .config/deny.toml check

  # ── supply chain: secret scanning ───────────────────────────────────────────
  # agents must never leak a provider key; fail the build if one is committed.
  gitleaks:
    name: gitleaks
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          persist-credentials: false
          fetch-depth: 0
      - uses: gitleaks/gitleaks-action@e0c47f4f8be36e29cdc102c57e68cb5cbf0e8d1e # v3.0.0
        env:
          GITHUB_TOKEN: ${{ github.token }}
          GITLEAKS_CONFIG: .github/config/gitleaks.toml
          # required since the repo moved under the rolter-ai org: gitleaks-action
          # gates org-owned repos behind a license (the CLI itself is free)
          GITLEAKS_LICENSE: ${{ secrets.GITLEAKS_LICENSE }}

  # ── workflow lint: validate the CI yaml itself ──────────────────────────────
  # agents edit workflows too; catch syntax and shell smells early.
  actionlint:
    name: actionlint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          persist-credentials: false
      - name: actionlint
        uses: raven-actions/actionlint@3d39aea434753780c3b3d4a1a31c854b4dbf49d7 # v2.2.0

  # ── workflow security: zizmor static analysis ───────────────────────────────
  # catches workflow security smells (unpinned actions, template injection in
  # run:, over-broad GITHUB_TOKEN). informational for now; promote to blocking
  # once the baseline is clean.
  zizmor:
    name: zizmor (informational)
    runs-on: ubuntu-latest
    continue-on-error: true
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          persist-credentials: false
      - uses: astral-sh/setup-uv@11f9893b081a58869d3b5fccaea48c9e9e46f990 # v8.3.2
      - name: zizmor
        run: uvx zizmor@1.26.1 --min-severity=low --persona=regular .github/workflows/
        env:
          GH_TOKEN: ${{ github.token }}

  # ── ui: typecheck + production build ────────────────────────────────────────
  ui:
    name: ui lint / build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ui
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          persist-credentials: false
      - uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2.2.0
      - name: install
        # dependabot's npm ecosystem bumps ui/package.json but never writes
        # bun.lock, so a frozen install fails on its PRs; reconcile the lockfile
        # for dependabot while keeping frozen integrity for every human PR
        env:
          IS_DEPENDABOT: ${{ github.actor == 'dependabot[bot]' }}
        run: |
          if [ "$IS_DEPENDABOT" = "true" ]; then
            bun install --no-frozen-lockfile
          else
            bun install --frozen-lockfile
          fi
      - name: lint (tsc --noEmit)
        run: bun run lint
      - name: build
        run: bun run build

  # ── smoke: run the gateway and hit it end-to-end ────────────────────────────
  # boots the real binary and exercises the built-in fake-llm (no upstream or
  # secrets needed), catching wiring regressions no unit test sees.
  smoke:
    name: gateway smoke (fake-llm)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          persist-credentials: false
      - uses: dtolnay/rust-toolchain@4be7066ada62dd38de10e7b70166bc74ed198c30 # stable
        with:
          toolchain: stable
      - uses: wild-linker/action@0bbbfa5df4380cab8e63cb8505a1ce65e1d10203 # 0.9.0
      - uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1
      - name: build gateway
        run: cargo build -p rolter-gateway
      - name: boot + probe
        run: |
          set -euo pipefail
          # no config file: the gateway starts open with the built-in fake-llm
          ./target/debug/rolter-gateway --config /nonexistent.toml &
          pid=$!
          trap 'kill "$pid" 2>/dev/null || true' EXIT
          # wait for the listener
          for _ in $(seq 1 30); do
            if curl -fsS http://127.0.0.1:4000/healthz >/dev/null 2>&1; then break; fi
            sleep 1
          done
          echo "== /healthz =="
          curl -fsS http://127.0.0.1:4000/healthz
          echo "== /v1/models =="
          curl -fsS http://127.0.0.1:4000/v1/models
          echo "== fake-llm chat (non-streaming) =="
          curl -fsS http://127.0.0.1:4000/v1/chat/completions \
            -H 'content-type: application/json' \
            -d '{"model":"fake-llm","messages":[{"role":"user","content":"hi"}]}' \
            | tee /tmp/resp.json
          grep -q '"choices"' /tmp/resp.json
          echo "== fake-llm chat (streaming) =="
          curl -fsS -N http://127.0.0.1:4000/v1/chat/completions \
            -H 'content-type: application/json' \
            -d '{"model":"fake-llm","stream":true,"messages":[{"role":"user","content":"hi"}]}' \
            | grep -q 'data:'

  # ── full-stack smoke: the production-shaped docker compose topology ──────────
  # boots postgres, redis, clickhouse, gateway and control together via
  # docker-compose.yml + the CI overlay, then exercises the gateway (fake-llm)
  # and the control snapshot path. catches wiring/env/compose regressions the
  # single-binary smoke above cannot see (e.g. a mis-named ROLTER_DATABASE_URL).
  # informational until the ~image-build cost and flake profile are trusted;
  # promote by dropping continue-on-error. see ROL-245.
  compose-smoke:
    name: compose smoke (informational)
    runs-on: ubuntu-latest
    continue-on-error: true
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          persist-credentials: false
      - name: full-stack compose smoke
        run: bash docker/smoke/smoke.sh

  # ── packaging: catch crate-publish breakage before a release ────────────────
  # `cargo publish` builds each crate from its packaged tarball in isolation, so a
  # file referenced outside the crate directory (e.g. include_str!("../../x")) or a
  # path dependency not carried in the package compiles fine in-tree but 404s at
  # publish time. `cargo package --workspace` reproduces that isolated verify build
  # for every publishable crate, so packaging breakage fails here on the PR instead
  # of mid-release after some crates have already published to crates.io (ROL-233).
  package:
    name: package (publish verify)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          persist-credentials: false
      - uses: dtolnay/rust-toolchain@4be7066ada62dd38de10e7b70166bc74ed198c30 # stable
        with:
          toolchain: stable
      - uses: wild-linker/action@0bbbfa5df4380cab8e63cb8505a1ce65e1d10203 # 0.9.0
      - uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1
      - name: cargo package (verifies each crate in isolation)
        run: cargo package --workspace --locked

  # ── spelling: docs / comments / identifiers ─────────────────────────────────
  # false positives are pinned in .github/config/typos.toml with an explaining comment each.
  typos:
    name: typos
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          persist-credentials: false
      - uses: crate-ci/typos@bee27e3a4fd1ea2111cf90ab89cd076c870fce14 # v1.48.0
        with:
          config: .github/config/typos.toml

  # ── unused dependencies ─────────────────────────────────────────────────────
  machete:
    name: unused deps
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          persist-credentials: false
      - uses: bnjbvr/cargo-machete@ac30a525c0a8d163a92d727b3ff079ee3f6ecb08 # v0.9.2

  # ── informational checks ────────────────────────────────────────────────────
  # non-blocking for now (continue-on-error); promote to required once their
  # baseline is understood. see the required-checks policy in ROL-124.

  # ── coverage: workspace line coverage with a ratcheting baseline ─────────────
  # informational (continue-on-error) per ROL-246: it computes workspace line
  # coverage, compares it against the committed baseline in
  # .github/coverage-baseline.txt (new code cannot drop below baseline − tolerance),
  # and uploads the lcov report as a CI artifact. it does not block until the
  # baseline is trusted — promote by dropping continue-on-error here.
  coverage:
    name: coverage (informational)
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          persist-credentials: false
      - uses: dtolnay/rust-toolchain@4be7066ada62dd38de10e7b70166bc74ed198c30 # stable
        with:
          toolchain: stable
          components: llvm-tools-preview
      - uses: wild-linker/action@0bbbfa5df4380cab8e63cb8505a1ce65e1d10203 # 0.9.0
      - uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1
      - uses: taiki-e/install-action@43aecc8d72668fbcfe75c31400bc4f890f1c5853 # v2.83.2
        with:
          tool: cargo-llvm-cov
      - name: cargo llvm-cov
        run: |
          cargo llvm-cov --workspace --all-features --no-report
          cargo llvm-cov report --summary-only
          cargo llvm-cov report --lcov --output-path lcov.info
          cargo llvm-cov report --json --summary-only > coverage.json
      - name: coverage ratchet
        run: bash .github/scripts/coverage-ratchet.sh coverage.json
      - name: upload coverage report
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: coverage-lcov
          path: |
            lcov.info
            coverage.json
          if-no-files-found: error

  # ── toml formatting: Cargo.toml / rolter.toml / deny.toml ───────────────────
  # blocking: the whole tree is taplo-formatted, so any drift is a real diff.
  taplo:
    name: taplo fmt
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          persist-credentials: false
      - uses: taiki-e/install-action@43aecc8d72668fbcfe75c31400bc4f890f1c5853 # v2.83.2
        with:
          tool: taplo
      - name: taplo fmt --check
        run: taplo fmt --check --diff

  # ── MSRV: build on the pinned minimum supported rust version ─────────────────
  # agents can silently adopt newer-than-declared language features; this catches
  # it against `rust-version` in Cargo.toml. informational until the baseline is
  # green on the pinned toolchain.
  msrv:
    name: msrv build (informational)
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          persist-credentials: false
      - uses: dtolnay/rust-toolchain@4be7066ada62dd38de10e7b70166bc74ed198c30 # stable
        with:
          toolchain: 1.82.0
      - uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1
      - name: cargo check (msrv)
        run: cargo check --workspace --all-features

  # ── cross-platform: check the workspace builds off linux ────────────────────
  # linux is covered by every job above; macOS catches os-specific breakage.
  # informational for now (adds runner minutes); promote if it earns its keep.
  cross-platform:
    name: macos check (informational)
    runs-on: macos-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          persist-credentials: false
      - uses: dtolnay/rust-toolchain@4be7066ada62dd38de10e7b70166bc74ed198c30 # stable
        with:
          toolchain: stable
      - uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1
      - name: cargo check (macos)
        run: cargo check --workspace --all-features

  # ── semver: no accidental breaking API change in published crates ───────────
  # meaningful once crates are published (ROL-117); informational until a
  # baseline version exists on crates.io to diff against.
  semver-checks:
    name: semver-checks (informational)
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          persist-credentials: false
      - uses: dtolnay/rust-toolchain@4be7066ada62dd38de10e7b70166bc74ed198c30 # stable
        with:
          toolchain: stable
      - uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1
      - uses: obi1kenobi/cargo-semver-checks-action@6b69fcf40e9b5fb17adeb57e4b6ecd020649a239 # v2.9
