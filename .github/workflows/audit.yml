name: audit

# scheduled supply-chain audit. cargo-deny runs on every PR (quality.yml) against
# the committed lockfile, but new RUSTSEC advisories land on already-merged code
# with no PR to trigger them. this runs daily so a fresh advisory on master
# surfaces as a failing scheduled run (and an issue) rather than sitting unseen.
on:
  schedule:
    # every day at 07:00 UTC
    - cron: "0 7 * * *"
  # allow a manual run from the actions tab
  workflow_dispatch:

permissions:
  contents: read

jobs:
  audit:
    name: cargo audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          persist-credentials: false
      - uses: dtolnay/rust-toolchain@4cda84d5c5c54efe2404f9d843567869ab1699d4 # stable
        with:
          toolchain: stable
      - uses: taiki-e/install-action@43aecc8d72668fbcfe75c31400bc4f890f1c5853 # v2.83.2
        with:
          tool: cargo-audit
      - name: cargo audit
        run: cargo audit
