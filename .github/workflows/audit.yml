name: audit

# scheduled supply-chain audit. cargo-deny runs on every PR (quality.yml) against
# the committed lockfile, but new RUSTSEC advisories land on already-merged code
# with no PR to trigger them. this runs daily so a fresh advisory on master
# surfaces as a failing scheduled run (and an issue) rather than sitting unseen.
on:
  schedule:
    # every day at 07:00 UTC
    - cron: "0 7 * * *"
  # allow a manual run from the actions tab
  workflow_dispatch:

permissions:
  contents: read

jobs:
  audit:
    name: cargo audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          persist-credentials: false
      - uses: dtolnay/rust-toolchain@4be7066ada62dd38de10e7b70166bc74ed198c30 # stable
        with:
          toolchain: stable
      - uses: taiki-e/install-action@2ca9b94c269419b7b0c711c09d0b21c4e1d51145 # v2.83.1
        with:
          tool: cargo-audit
      - name: cargo audit
        run: cargo audit
