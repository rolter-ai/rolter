name: Bug report
description: Report a problem with rolter
labels: ["bug"]
body:
  - type: textarea
    id: what-happened
    attributes:
      label: What happened?
      description: A clear description of the bug and what you expected instead.
    validations:
      required: true
  - type: textarea
    id: repro
    attributes:
      label: Steps to reproduce
      description: Include the request, config snippet (redact secrets), and logs.
      render: shell
    validations:
      required: true
  - type: dropdown
    id: component
    attributes:
      label: Component
      options:
        - gateway
        - balancer
        - proxy
        - control
        - ui
        - other
    validations:
      required: true
  - type: input
    id: version
    attributes:
      label: Version / commit
    validations:
      required: false
