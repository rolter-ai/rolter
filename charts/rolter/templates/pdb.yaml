{{- if .Values.gateway.podDisruptionBudget.enabled }}
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: {{ include "rolter.fullname" . }}-gateway
  labels:
    {{- include "rolter.labels" . | nindent 4 }}
spec:
  maxUnavailable: {{ .Values.gateway.podDisruptionBudget.maxUnavailable }}
  selector:
    matchLabels:
      app.kubernetes.io/name: {{ include "rolter.name" . }}
      app.kubernetes.io/instance: {{ .Release.Name }}
      app.kubernetes.io/component: gateway
{{- end }}

